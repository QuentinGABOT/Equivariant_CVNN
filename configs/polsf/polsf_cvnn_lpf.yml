# Task-specific configuration for Segmentation task
task: segmentation

# Data configuration
data:
  recompute_statistics: True
  shuffle: True
  batch_size: 128
  dataset:
    name: PolSFDataset
    trainpath: $TMPDIR/data
    patch_size: 64
    patch_stride: 64
  num_workers: 4
  valid_ratio: 0.15
  test_ratio: 0.15
  transforms:
    - name: logamplitude

# Model configuration
model:
  activation: modReLU
  channels_width: 16
  class: UNet
  layer_mode: complex
  num_layers: 4
  num_blocks: 1
  normalization_layer: batch
  downsampling_layer: LPF
  upsampling_layer: Upsample
  residual: True
  dropout: 0.1
  projection:
    class: ModCtoR
    global: true
    softmax: Softmax

evaluation:
  check_invariance: True
  domain: spatial

# Logging configuration
logging:
  logdir: ./logs
  wandb:
    entity: equivariant_cvnn
    project: polsf
    name: unet_lpf

# Loss configuration
loss:
  name: FocalLoss
  gamma: 3

# Training configuration
training:
  nepochs: 500
  optim:
    algo: AdamW
    params:
      lr: 0.001
      weight_decay: 0.005
  scheduler:
    algo: StepLR
    params:
      step_size: 1000
      gamma: 1.0

# Data type configuration
dtype: complex64
