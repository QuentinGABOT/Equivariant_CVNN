# Task-specific configuration for Segmentation task
task: segmentation

# Data configuration
data:
  recompute_statistics: True
  shuffle: True
  batch_size: 16
  dataset:
    name: PolSFDataset
    trainpath: $TMPDIR/data
    patch_size: 64
    patch_stride: 64
  num_workers: 4
  valid_ratio: 0.15
  test_ratio: 0.15
  transforms:
    - name: logamplitude
    - name: realimaginary

# Model configuration
model:
  activation: ReLU
  channels_width: 32
  class: UNet
  layer_mode: real
  num_layers: 4
  num_blocks: 1
  normalization_layer: batch
  downsampling_layer: LPD
  upsampling_layer: LPU
  residual: True
  dropout: 0.1
  projection:
    class: NoCtoR
    global: true
    softmax: Softmax
  gumbel_tau:
    start_value: 10
    gamma: 0.1
    start_decay_epoch: 10
    min_value: 0.00001

evaluation:
  check_invariance: True
  domain: spatial

# Logging configuration
logging:
  logdir: ./logs
  wandb:
    entity: equivariant_cvnn
    project: polsf
    name: unet_rvnn_lps

# Loss configuration
loss:
  name: FocalLoss
  gamma: 3

# Training configuration
training:
  nepochs: 500
  optim:
    algo: AdamW
    params:
      lr: 0.001
      weight_decay: 0.005
  scheduler:
    algo: StepLR
    params:
      step_size: 1000
      gamma: 1.0

# Data type configuration
dtype: float64
