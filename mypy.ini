[mypy]
python_version = 3.12
show_error_codes = True
ignore_missing_imports = True
exclude = ^(tests|docs)/
namespace_packages = True

# Optional stricter settings for project files can be enabled later per-module

[tool.mypy-packages]
# keep placeholder for future per-package overrides

# Temporarily ignore very noisy modules to get a focused mypy baseline.
[mypy-cvnn.evaluate]
ignore_errors = True

[mypy-cvnn.visualize]
ignore_errors = True

[mypy-cvnn.data]
ignore_errors = True

[mypy-cvnn.models.utils]
ignore_errors = True

[mypy-cvnn.train]
ignore_errors = True

[mypy-cvnn.experiments]
ignore_errors = True

[mypy-cvnn.losses]
ignore_errors = True

[mypy-cvnn.callbacks]
ignore_errors = True

[mypy-cvnn.schedulers]
ignore_errors = True

[mypy-cvnn.metrics_registry]
ignore_errors = True

[mypy-cvnn.base_experiment]
ignore_errors = True
